<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumi DM</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:380px;min-height:260px;background:#0d1015;color:#eef2f7;font:13px Inter,system-ui,sans-serif}button,input{font:inherit}.header,.row,.pair-head,.dl-header,.speed-bar,.intercept-row,.tabs-row{display:flex;align-items:center}.header{justify-content:space-between;padding:13px 15px;border-bottom:1px solid #252b35}.brand{display:flex;gap:9px;align-items:center;font-weight:750}.logo{width:22px;height:22px;object-fit:contain}.link-btn,.clear-link{border:0;background:none;color:#66a8ff;cursor:pointer}.url-row{display:flex;gap:7px;padding:12px 15px 7px}.url-input,.server-input,.pair-input{min-width:0;flex:1;border:1px solid #2a313d;background:#161b23;color:#eef2f7;border-radius:8px;padding:8px 10px;outline:none}.url-input:focus,.server-input:focus,.pair-input:focus{border-color:#4f9ef8}.primary,.type-btn,.tabs-btn,.save-btn{border:1px solid transparent;border-radius:8px;padding:7px 11px;cursor:pointer}.primary{background:#4f9ef8;color:white;font-weight:700}.type-row{display:flex;gap:6px;padding:0 15px 10px}.type-btn,.save-btn{background:#171d26;border-color:#2a313d;color:#9ba6b5}.type-btn.is-active{color:#72b3ff;border-color:#315f93;background:#17283d}.status-msg,.pair-message,.tabs-info{font-size:11px;color:#98a3b3}.status-msg{padding:0 15px 8px;min-height:18px}.pair-panel{margin:0 12px 10px;padding:11px;border:1px solid #2a313d;border-radius:10px;background:#121720}.pair-head{justify-content:space-between;margin-bottom:8px}.pair-title{font-weight:700}.pair-badge{font-size:10px;padding:3px 7px;border-radius:99px}.pair-badge.on{color:#78d9ae;background:#153326}.pair-badge.off{color:#ffce6a;background:#3b2d11}.pair-badge.warn{color:#ff9b9b;background:#3a1818}.pair-form{display:flex;gap:7px}.pair-input{text-transform:uppercase;letter-spacing:.08em}.pair-message{min-height:15px;margin-top:6px}.danger-link{border:0;background:none;color:#f58a8a;font-size:11px;cursor:pointer;padding:0}.dl-section{border-top:1px solid #252b35}.dl-header{justify-content:space-between;padding:9px 15px 6px}.dl-title{font-size:11px;color:#98a3b3;text-transform:uppercase;font-weight:700}.dl-list{max-height:230px;overflow:auto;padding:0 10px 8px}.dl-item{display:flex;gap:7px;align-items:center;padding:7px 5px;border-bottom:1px solid #202631}.dl-dot{width:7px;height:7px;border-radius:50%;background:#596273}.dl-dot.running{background:#4f9ef8}.dl-dot.completed{background:#5ed19d}.dl-dot.failed,.dl-dot.cancelled{background:#f87171}.dl-dot.paused,.dl-dot.browser_pending{background:#fbbf24}.dl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.dl-pct{font-size:10px;color:#98a3b3}.empty-msg{padding:16px;text-align:center;color:#98a3b3}.tabs-row,.intercept-row,.speed-bar,.settings-row{padding:9px 15px;border-top:1px solid #252b35;gap:8px}.tabs-btn{background:#14253a;border-color:#2b5a8c;color:#72b3ff;font-size:11px}.tabs-info{flex:1}.intercept-row{justify-content:space-between}.hint{font-size:10px;color:#818c9b}.toggle{position:relative;width:38px;height:21px}.toggle input{display:none}.slider{position:absolute;inset:0;border-radius:20px;background:#2b3340;cursor:pointer}.slider:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;border-radius:50%;background:white;transition:.15s}.toggle input:checked+.slider{background:#4f9ef8}.toggle input:checked+.slider:before{transform:translateX(17px)}.speed-bar{color:#72b3ff;font-weight:700}.speed-dot{width:7px;height:7px;border-radius:50%;background:#36404d}.speed-dot.active{background:#5ed19d}.speed-sub{margin-left:auto;color:#818c9b;font-size:10px;font-weight:400}.adv-toggle{padding:8px 15px;border-top:1px solid #252b35;color:#98a3b3;font-size:11px;cursor:pointer}.settings-row{display:flex}.server-input{padding:6px 8px;font-size:11px}.save-btn{padding:6px 9px;font-size:11px}.sep{color:#46505f}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#333c49;border-radius:5px}
</style>
</head>
<body>
<div class="header"><div class="brand"><img src="icons/icon48.png" class="logo" alt="">Lumi DM</div><button class="link-btn" id="open-ui">Open desktop manager →</button></div>
<div class="url-row"><input class="url-input" id="url-input" placeholder="Paste URL, magnet, or video link…"><button class="primary" id="go-btn">Go</button></div>
<div class="type-row"><button class="type-btn is-active" data-type="auto">Auto</button><button class="type-btn" data-type="video">Video</button><button class="type-btn" data-type="torrent">Torrent</button></div>
<div class="status-msg" id="status-msg"></div>
<section class="pair-panel">
  <div class="pair-head"><span class="pair-title">Secure connection</span><span class="pair-badge off" id="pair-badge">Checking…</span></div>
  <div class="pair-form" id="pair-form"><input class="pair-input" id="pair-code" maxlength="9" placeholder="ABCD-EFGH"><button class="primary" id="pair-submit">Pair</button></div>
  <button class="danger-link" id="pair-disconnect" hidden>Forget this pairing</button>
  <div class="pair-message" id="pair-message">Generate a browser-extension code in Lumi Settings → Security.</div>
</section>
<section class="dl-section"><div class="dl-header"><span class="dl-title">Recent downloads</span><button class="clear-link" id="clear-btn">Clear done</button></div><div class="dl-list" id="dl-list"><div class="empty-msg" id="empty-msg">Connecting…</div></div></section>
<div class="tabs-row"><button class="tabs-btn" id="all-tabs-btn">⚡ From all open tabs</button><div id="tabs-status" class="tabs-info"></div></div>
<div class="intercept-row"><div><div style="font-weight:700">Intercept downloads</div><div class="hint">Pause matching browser downloads while Lumi asks where to save</div></div><label class="toggle"><input type="checkbox" id="intercept-toggle" checked><span class="slider"></span></label></div>
<div class="speed-bar" id="speed-bar"><span class="speed-dot" id="speed-dot"></span><span id="inet-label">↓ -- Mbps</span><span class="sep">·</span><span id="speed-label">⬇ 0 B/s</span><span class="speed-sub" id="speed-sub">No active downloads</span></div>
<div class="adv-toggle" id="adv-toggle">⚙ Server settings <span id="adv-arrow">▸</span></div>
<div class="settings-row" id="server-row" style="display:none"><input class="server-input" id="server-input" placeholder="http://localhost:7000"><button class="save-btn" id="save-server">Save</button></div>
<script src="popup-security.js"></script>
<script src="popup.js"></script>
<script src="popup-native-handoff.js"></script>
</body>
</html>
