<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumi Widget</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Segoe UI",system-ui,sans-serif;color:#eef4ff;-webkit-user-select:none}button{font:inherit;color:inherit}.widget{position:absolute;inset:2px;border:1px solid rgba(132,151,188,.23);border-radius:34px;background:linear-gradient(135deg,rgba(16,19,28,.97),rgba(12,17,27,.97));box-shadow:0 14px 34px rgba(0,0,0,.34);overflow:hidden;-webkit-app-region:drag;transition:border-radius .16s}.widget.expanded{border-radius:18px}.compact{height:62px;display:flex;align-items:center;gap:8px;padding:7px 9px}.logo-button{width:42px;height:42px;border:0;background:transparent;padding:2px;display:grid;place-items:center;flex:none;cursor:pointer;-webkit-app-region:no-drag}.logo-button img{width:38px;height:38px;object-fit:contain;object-position:center;display:block;filter:drop-shadow(0 5px 14px rgba(87,93,255,.35))}.summary{min-width:0;flex:1;cursor:pointer;-webkit-app-region:no-drag}.primary{font-size:12px;font-weight:760;color:#67b6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.secondary{font-size:9px;color:rgba(231,239,255,.5);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.compact-actions{display:flex;align-items:center;gap:5px;flex:none;-webkit-app-region:no-drag}.circle{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035);display:grid;place-items:center;cursor:pointer;position:relative}.circle:hover{background:rgba(255,255,255,.1)}.circle svg{position:absolute;inset:0;transform:rotate(-90deg);pointer-events:none}.ring-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2.4}.ring-fill{fill:none;stroke:#55a8ff;stroke-width:2.4;stroke-linecap:round;stroke-dasharray:94.25;stroke-dashoffset:94.25;transition:stroke-dashoffset .35s,stroke .2s}.circle span{font-size:11px;position:relative;z-index:1}.expand{width:25px;height:25px;font-size:12px}.expanded-panel{display:none;height:calc(100% - 62px);border-top:1px solid rgba(255,255,255,.07);padding:10px;-webkit-app-region:no-drag}.widget.expanded .expanded-panel{display:flex;flex-direction:column}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.panel-head strong{font-size:11px}.panel-head span{font-size:8px;color:rgba(231,239,255,.42)}.task-list{display:grid;gap:6px;overflow:auto;flex:1;padding-right:2px}.task{border:1px solid rgba(255,255,255,.07);border-radius:10px;background:rgba(255,255,255,.025);padding:8px}.task-top{display:flex;align-items:center;gap:7px}.task-name{min-width:0;flex:1;font-size:10px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-state{font-size:8px;color:#8ea0b7;text-transform:capitalize}.progress{height:4px;border-radius:10px;background:rgba(255,255,255,.08);margin-top:6px;overflow:hidden}.progress i{height:100%;display:block;border-radius:inherit;background:linear-gradient(90deg,#54a9ff,#745eff)}.task-meta{display:flex;justify-content:space-between;gap:8px;font-size:8px;color:#718096;margin-top:5px}.task-buttons{display:flex;gap:5px;margin-top:7px}.mini{border:1px solid rgba(255,255,255,.1);border-radius:7px;background:rgba(255,255,255,.035);padding:4px 7px;font-size:8px;cursor:pointer}.mini:hover{background:rgba(255,255,255,.1)}.mini.danger{color:#ff9aa1;border-color:rgba(255,116,125,.2)}.empty{display:grid;place-items:center;text-align:center;height:100%;font-size:9px;color:#65748a;line-height:1.5}.panel-footer{display:flex;gap:6px;padding-top:8px}.footer-btn{flex:1;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);padding:7px;font-size:9px;cursor:pointer}.footer-btn.primary-btn{background:linear-gradient(135deg,#4d9ff7,#675eff);border-color:transparent;color:white}.offline .primary{color:#ff8f99}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2e3a4a;border-radius:5px}
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="compact">
    <button class="logo-button" id="logo-button" title="Lumi controls"><img src="http://127.0.0.1:7000/static/favicon-96.png" alt="Lumi"></button>
    <div class="summary" id="summary" title="Show active downloads"><div class="primary" id="primary">Connecting…</div><div class="secondary" id="secondary">Lumi Download Manager</div></div>
    <div class="compact-actions">
      <button class="circle" id="ring-button" title="Pause or resume"><svg viewBox="0 0 34 34"><circle class="ring-track" cx="17" cy="17" r="15"></circle><circle class="ring-fill" id="ring" cx="17" cy="17" r="15"></circle></svg><span id="ring-icon">⏸</span></button>
      <button class="circle expand" id="expand-button" title="More controls"><span id="expand-icon">⌃</span></button>
    </div>
  </div>
  <section class="expanded-panel">
    <div class="panel-head"><div><strong id="panel-title">Active downloads</strong><br><span id="panel-speed">0 B/s</span></div><button class="mini" id="collapse">Collapse</button></div>
    <div class="task-list" id="task-list"></div>
    <div class="panel-footer"><button class="footer-btn" id="pause-all">Pause / resume all</button><button class="footer-btn primary-btn" id="open-main">Open Lumi Manager</button></div>
  </section>
</div>
<script>
const CIRC=94.25;let expanded=false;let snapshot={downloads:[],net:{},settings:{},capacity:{}};let lastStatuses=new Map();let knownTaskIds=new Set();let sessionTaskIds=new Set();let initialised=false;let completionUntil=0;
const $=id=>document.getElementById(id);
function fmtRate(value){const b=Number(value||0);if(b>=1048576)return`${(b/1048576).toFixed(2)} MB/s`;if(b>=1024)return`${(b/1024).toFixed(1)} KB/s`;return`${Math.round(b)} B/s`}
function fmtMbpsFromBytes(value){const bits=Number(value||0)*8;if(bits>=1e6)return`${(bits/1e6).toFixed(1)} Mbps`;if(bits>=1e3)return`${(bits/1e3).toFixed(0)} Kbps`;return`${Math.round(bits)} bps`}
function fmtMbps(value){const number=Number(value||0);return number>=100?`${number.toFixed(0)} Mbps`:`${number.toFixed(1)} Mbps`}
function fmtBytes(value){const b=Number(value||0);if(b>=1073741824)return`${(b/1073741824).toFixed(1)} GB`;if(b>=1048576)return`${(b/1048576).toFixed(1)} MB`;if(b>=1024)return`${(b/1024).toFixed(0)} KB`;return`${b} B`}
function progress(task){return task.total_bytes?Math.max(0,Math.min(100,Number(task.downloaded_bytes||0)*100/Number(task.total_bytes))):Number(task.progress_percent||0)}
function setRing(pct,color,icon){$('ring').style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,pct)));$('ring').style.stroke=color;$('ring-icon').textContent=icon}
function updateSessionTasks(){if(!initialised){for(const task of snapshot.downloads){knownTaskIds.add(task.id);lastStatuses.set(task.id,task.status);if(['running','resolving','pausing'].includes(task.status))sessionTaskIds.add(task.id)}initialised=true;return}for(const task of snapshot.downloads){const previous=lastStatuses.get(task.id);if(!knownTaskIds.has(task.id)||(['running','resolving'].includes(task.status)&&!['running','resolving'].includes(previous)))sessionTaskIds.add(task.id);knownTaskIds.add(task.id);lastStatuses.set(task.id,task.status)}}
function activeTasks(){return snapshot.downloads.filter(task=>['running','resolving','queued','post_processing','pausing'].includes(task.status)&&(['running','resolving','pausing'].includes(task.status)||sessionTaskIds.has(task.id)))}
function pausedTasks(){return snapshot.downloads.filter(task=>task.status==='paused'&&sessionTaskIds.has(task.id))}
function capacityLine(){const value=snapshot.capacity?.result;if(!value)return snapshot.capacity?.state==='running'?'Testing connection capacity…':'Capacity not tested';return`Capacity ↓ ${fmtMbps(value.download_mbps)} · ↑ ${fmtMbps(value.upload_mbps)}`}
function render(){updateSessionTasks();const widget=$('widget');widget.classList.toggle('expanded',expanded);widget.classList.toggle('offline',!snapshot.online);$('expand-icon').textContent=expanded?'⌄':'⌃';const active=activeTasks();const paused=pausedTasks();const downloadSpeed=active.reduce((sum,task)=>sum+Number(task.speed_bytes_per_sec||0),0);const liveRx=Number(snapshot.net?.rx_bps||0);const liveTx=Number(snapshot.net?.tx_bps||0);const now=Date.now();let newlyComplete=false;for(const task of snapshot.downloads){const previous=lastStatuses.get(task.id);if(sessionTaskIds.has(task.id)&&task.status==='completed'&&previous&&previous!=='completed')newlyComplete=true;lastStatuses.set(task.id,task.status)}if(newlyComplete)completionUntil=now+5000;if(!snapshot.online){$('primary').textContent='Lumi server recovering';$('secondary').textContent='The widget will reconnect automatically';setRing(0,'rgba(255,255,255,.12)','!')}else if(active.length){const lead=active[0];const total=active.reduce((sum,t)=>sum+Number(t.total_bytes||0),0);const done=active.reduce((sum,t)=>sum+Number(t.downloaded_bytes||0),0);$('primary').textContent=lead.filename||lead.metadata?.title||'Lumi download';$('secondary').textContent=`↓ ${fmtRate(downloadSpeed)} · ${total?Math.round(done*100/total):0}%${active.length>1?` · +${active.length-1} more`:''}`;setRing(total?done/total:0,'#55a8ff','⏸')}else if(paused.length){$('primary').textContent='Session download paused';$('secondary').textContent='Open Lumi Manager to resume';setRing(progress(paused[0])/100,'#f2c45e','•')}else if(now<completionUntil){$('primary').textContent='✓ Download complete';$('secondary').textContent=capacityLine();setRing(1,'#55d69c','✓')}else{$('primary').textContent=`Live ↓ ${fmtMbpsFromBytes(liveRx)}`;$('secondary').textContent=capacityLine();setRing(0,'rgba(255,255,255,.18)','•')}$('panel-title').textContent=active.length?'Active downloads':'Connection monitor';$('panel-speed').textContent=active.length?`${fmtRate(downloadSpeed)} combined`:`Live ↓ ${fmtMbpsFromBytes(liveRx)}${snapshot.settings?.showUpload?` · ↑ ${fmtMbpsFromBytes(liveTx)}`:''} · ${capacityLine()}`;renderTasks(active.length?active:paused)}
function renderTasks(tasks){const list=$('task-list');if(!tasks.length){list.innerHTML=`<div class="empty">No active downloads.<br>${escapeHtml(capacityLine())}<br>Run a new test from the Lumi gear menu.</div>`;return}list.innerHTML=tasks.slice(0,8).map(task=>`<article class="task"><div class="task-top"><div class="task-name" title="${escapeHtml(task.filename||task.url)}">${escapeHtml(task.filename||task.url||task.id)}</div><span class="task-state">${escapeHtml(task.status)}</span></div><div class="progress"><i style="width:${progress(task)}%"></i></div><div class="task-meta"><span>${progress(task).toFixed(1)}%</span><span>${fmtRate(task.speed_bytes_per_sec||0)} · ${fmtBytes(task.downloaded_bytes||0)}</span></div><div class="task-buttons">${task.status==='paused'?'<button class="mini" data-action="main">Resume in manager</button>':`<button class="mini" data-action="pause" data-id="${escapeHtml(task.id)}">Pause</button>`}<button class="mini danger" data-action="cancel" data-id="${escapeHtml(task.id)}">Cancel</button></div></article>`).join('')}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
async function refresh(){snapshot=await window.lumiWidget.snapshot();expanded=Boolean(snapshot.expanded);render()}
async function toggle(){expanded=await window.lumiWidget.toggleExpanded();render()}
$('summary').onclick=toggle;$('logo-button').onclick=toggle;$('expand-button').onclick=toggle;$('collapse').onclick=toggle;$('open-main').onclick=()=>window.lumiWidget.action('main');$('pause-all').onclick=async()=>{if(!activeTasks().length)return window.lumiWidget.action('main');await window.lumiWidget.action('pause-all');refresh()};$('ring-button').onclick=async()=>{if(!activeTasks().length)return toggle();await window.lumiWidget.action('pause-all');refresh()};$('task-list').onclick=async event=>{const button=event.target.closest('[data-action]');if(!button)return;await window.lumiWidget.action(button.dataset.action,button.dataset.id||'');refresh()};window.lumiWidget.onExpanded(value=>{expanded=value;render()});window.lumiWidget.onSettings(()=>refresh());window.lumiWidget.onCapacity(value=>{snapshot.capacity=value;render()});refresh();setInterval(refresh,1300);
</script>
</body>
</html>
