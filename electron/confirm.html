<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumi — New download</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Segoe UI",system-ui,sans-serif;color:#edf3fb}button,input,select{font:inherit;color:inherit}.card{position:absolute;inset:4px;border:1px solid rgba(129,151,189,.26);border-radius:18px;background:linear-gradient(150deg,rgba(18,23,34,.985),rgba(10,14,23,.985));box-shadow:0 24px 70px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}.head{height:64px;display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.075);-webkit-app-region:drag}.logo{width:42px;height:42px;object-fit:contain;object-position:center;filter:drop-shadow(0 6px 16px rgba(87,93,255,.35))}.heading{min-width:0;flex:1}.heading small,.heading strong{display:block}.heading small{font-size:8px;text-transform:uppercase;letter-spacing:.13em;color:#7d8ca2}.heading strong{font-size:13px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.close{width:28px;height:28px;border:1px solid rgba(255,255,255,.1);border-radius:50%;background:rgba(255,255,255,.04);cursor:pointer;-webkit-app-region:no-drag}.close:hover{background:rgba(255,116,125,.14);color:#ff9da4}.body{flex:1;min-height:0;padding:13px 14px;display:flex;flex-direction:column;gap:10px;overflow:auto}.source{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start;padding:10px;border:1px solid rgba(87,165,255,.15);border-radius:11px;background:rgba(42,66,99,.12)}.source-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.source-url{font-size:8px;color:#6f7f94;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.size{font-size:9px;color:#a9cfff;white-space:nowrap}.form{display:grid;gap:9px}.label{display:grid;gap:5px;color:#8492a6;font-size:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:750}.input,.select{width:100%;border:1px solid #293548;border-radius:9px;background:#0d131d;color:#edf3fb;padding:8px 9px;outline:none}.input:focus,.select:focus{border-color:#4d85c5}.folder-row{display:grid;grid-template-columns:minmax(0,1fr) 36px;gap:6px}.browse{border:1px solid #293548;border-radius:9px;background:#151d29;cursor:pointer}.browse:hover{background:#1d2938}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}.more-toggle{border:0;background:none;color:#7db8ff;text-align:left;padding:2px 0;font-size:9px;cursor:pointer}.more{display:none;grid-template-columns:1fr 1fr;gap:8px;padding:9px;border:1px solid rgba(255,255,255,.07);border-radius:10px;background:rgba(255,255,255,.02)}.more.open{display:grid}.note{display:flex;gap:7px;align-items:flex-start;font-size:8px;line-height:1.45;color:#758499;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.025)}.status{min-height:15px;font-size:9px;color:#f0c977}.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px 14px 14px;border-top:1px solid rgba(255,255,255,.07)}.btn{border:1px solid rgba(255,255,255,.11);border-radius:9px;background:#172130;padding:9px 10px;cursor:pointer;font-size:10px;font-weight:700}.btn:hover{background:#202d3e}.btn.primary{border-color:transparent;background:linear-gradient(135deg,#4c9ff8,#675eff);color:white}.btn.browser{color:#a7d0ff}.btn.cancel{color:#ff9ea5;border-color:rgba(255,116,125,.18);background:rgba(255,116,125,.06)}.btn:disabled{opacity:.45;cursor:not-allowed}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#324156;border-radius:6px}
</style>
</head>
<body>
<section class="card">
  <header class="head"><img class="logo" src="http://127.0.0.1:7000/static/favicon-96.png" alt="Lumi"><div class="heading"><small>New download</small><strong id="head-name">Preparing download…</strong></div><button class="close" id="close" title="Keep this download in the browser">×</button></header>
  <main class="body">
    <div class="source"><div><div class="source-title" id="source-name">Loading source…</div><div class="source-url" id="source-url"></div></div><span class="size" id="source-size"></span></div>
    <form class="form" id="setup-form">
      <label class="label">File name<input class="input" id="filename" name="filename" required maxlength="240"></label>
      <label class="label">Save location<div class="folder-row"><input class="input" id="target-dir" name="target_dir" list="recent-folders" required><datalist id="recent-folders"></datalist><button class="browse" id="browse" type="button" title="Choose folder">📁</button></div></label>
      <div class="split"><label class="label">Category<select class="select" id="category" name="category_id"></select></label><label class="label">Queue<select class="select" id="queue" name="queue_id"></select></label></div>
      <button class="more-toggle" id="more-toggle" type="button">▸ More download options</button>
      <div class="more" id="more"><label class="label">Connections<input class="input" name="connections" type="number" min="1" max="128" value="8"></label><label class="label">Priority<input class="input" name="priority" type="number" min="-1000" max="1000" value="0"></label><label class="label">Speed limit (bytes/s)<input class="input" name="max_speed_bps" type="number" min="0" value="0"></label><label class="label">Existing file<select class="select" name="duplicate_policy"><option value="rename">Keep both</option><option value="overwrite">Overwrite</option><option value="reject">Stop if it exists</option></select></label></div>
      <div class="note"><span>ℹ</span><span>The full Lumi manager stays closed. Start now collapses this panel back into the corner speed widget.</span></div>
      <div class="status" id="status"></div>
    </form>
  </main>
  <footer class="actions"><button class="btn primary" id="start" type="button">▶ Start download</button><button class="btn" id="later" type="button">Add paused</button><button class="btn browser" id="browser" type="button">Use browser</button><button class="btn cancel" id="cancel" type="button">Cancel both</button></footer>
</section>
<script>
let setup=null;const $=id=>document.getElementById(id);
function fmtBytes(value){const b=Number(value||0);if(b>=1073741824)return`${(b/1073741824).toFixed(2)} GB`;if(b>=1048576)return`${(b/1048576).toFixed(1)} MB`;if(b>=1024)return`${(b/1024).toFixed(0)} KB`;return b?`${b} B`:'Size unknown'}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
async function load(){setup=await window.lumiSetup.data();if(!setup?.task){$('status').textContent='The pending download is unavailable.';return}const task=setup.task;$('head-name').textContent=task.filename||task.url||'New download';$('source-name').textContent=task.filename||task.url||'Download';$('source-url').textContent=task.request?.original_page||task.url||'';$('source-url').title=task.url||'';$('source-size').textContent=fmtBytes(task.total_bytes);$('filename').value=task.filename||'download.bin';$('target-dir').value=task.target_dir||setup.settings?.default_dir||'';const recent=[setup.settings?.default_dir,setup.settings?.temp_dir,task.target_dir].filter(Boolean);$('recent-folders').innerHTML=[...new Set(recent)].map(value=>`<option value="${escapeHtml(value)}"></option>`).join('');$('category').innerHTML=(setup.categories||[]).map(item=>`<option value="${escapeHtml(item.id)}" ${(task.category_id||'other')===item.id?'selected':''}>${escapeHtml(item.name)}</option>`).join('');$('queue').innerHTML=(setup.queues||[]).map(item=>`<option value="${escapeHtml(item.id)}" ${(task.queue_id||'default')===item.id?'selected':''}>${escapeHtml(item.name)}</option>`).join('');$('setup-form').elements.connections.value=task.connections||setup.settings?.default_connections||8;$('setup-form').elements.priority.value=task.priority||0;$('setup-form').elements.max_speed_bps.value=task.max_speed_bps||0}
$('more-toggle').onclick=()=>{const open=$('more').classList.toggle('open');$('more-toggle').textContent=`${open?'▾':'▸'} More download options`};$('browse').onclick=async()=>{const folder=await window.lumiSetup.pickFolder();if(folder)$('target-dir').value=folder};
function formValue(startMode){const form=$('setup-form');return{filename:$('filename').value.trim(),target_dir:$('target-dir').value.trim(),category_id:$('category').value,queue_id:$('queue').value,connections:Number(form.elements.connections.value||8),priority:Number(form.elements.priority.value||0),max_speed_bps:Number(form.elements.max_speed_bps.value||0),duplicate_policy:form.elements.duplicate_policy.value,start_mode:startMode}}
function busy(value,message=''){for(const id of['start','later','browser','cancel','close'])$(id).disabled=value;$('status').textContent=message}
async function confirmDownload(mode){if(!$('filename').value.trim()||!$('target-dir').value.trim()){return $('status').textContent='Choose a filename and save location.'}busy(true,mode==='later'?'Adding the task paused…':'Starting in Lumi…');try{await window.lumiSetup.confirm(formValue(mode));}catch(error){busy(false,error.message)}}
$('start').onclick=()=>confirmDownload('now');$('later').onclick=()=>confirmDownload('later');$('browser').onclick=async()=>{busy(true,'Returning this download to the browser…');try{await window.lumiSetup.useBrowser()}catch(error){busy(false,error.message)}};$('cancel').onclick=async()=>{busy(true,'Cancelling…');try{await window.lumiSetup.cancel()}catch(error){busy(false,error.message)}};$('close').onclick=async()=>{busy(true,'Returning this download to the browser…');try{await window.lumiSetup.useBrowser()}catch(error){busy(false,error.message)}};load();
</script>
</body>
</html>
