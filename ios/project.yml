name: LumiDM

options:
  bundleIdPrefix: com.lumi
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.lumi.dm
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"

targets:
  LumiDM:
    type: application
    platform: iOS
    sources:
      - path: LumiDM
        type: group
        excludes:
          - "ViewController.swift"   # replaced by tab-based architecture
    info:
      path: LumiDM/Info.plist
      properties:
        CFBundleName: Lumi DM
        CFBundleDisplayName: Lumi DM
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSUserNotificationsUsageDescription: "Show download progress and completion alerts on your lock screen."
        UIBackgroundModes:
          - fetch
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - LUMIDM
            CFBundleURLName: com.lumi.dm
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
