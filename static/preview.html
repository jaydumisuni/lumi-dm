<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Preview — Lumi DM</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .preview-shell { max-width: 1000px; margin: 24px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.45); }
    .preview-titlebar { display:flex; align-items:center; gap:12px; padding:12px 16px; background: linear-gradient(90deg, rgba(0,0,0,0.35), rgba(0,0,0,0.08)); color:var(--text); }
    .preview-titlebar img.logo { width:28px; height:28px; border-radius:6px; object-fit:contain; }
    .preview-stage { height: 420px; background-image: url('../Resouces/background.png'); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; color:#fff; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
    .preview-popup { width:360px; background:rgba(17,19,23,0.95); border-radius: 10px; border:1px solid rgba(255,255,255,0.06); padding:0; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.5); }
    .preview-popup .header { display:flex; align-items:center; gap:8px; padding:12px; }
    .preview-popup .header img.logo-small { width:20px; height:20px; border-radius:4px; object-fit:contain; }
    .preview-footer { padding: 12px 16px; text-align:right; font-size:13px; color:var(--muted); }
    @media (max-width: 820px) { .preview-shell { margin: 12px; } }
  </style>
</head>
<body>

<div class="preview-shell">
  <div class="preview-titlebar">
    <img src="../Resouces/my_logo.png" class="logo" alt="logo">
    <div>
      <div style="font-weight:700">Reminal Download Manager</div>
      <div style="font-size:12px;color:var(--muted)">Titlebar / app icon preview</div>
    </div>
  </div>

  <div class="preview-stage">
    <div class="preview-popup">
      <div class="header">
        <img src="../Resouces/my_logo.png" class="logo-small" alt="logo-small">
        <div class="brand">⬇ Lumi DM</div>
        <div style="margin-left:auto; font-size:12px; color:var(--muted)">v1.0.0</div>
      </div>
      <div style="padding: 12px; border-top:1px solid var(--border);">
        <div style="margin-bottom:8px; color:var(--muted);">Paste URL or magnet link to send to the server</div>
        <input style="width:100%; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.18); color:var(--text)" placeholder="https://...">
        <div style="display:flex; gap:8px; margin-top:10px;">
          <button class="primary-btn">⬇ Send</button>
          <button class="ghost-btn">Open UI</button>
        </div>
      </div>
    </div>
  </div>

  <div class="preview-footer">Using images from: Resouces/my_logo.png, Resouces/background.png</div>
</div>

</body>
</html>
