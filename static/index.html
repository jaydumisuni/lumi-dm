<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lumi Download Manager</title>
<meta name="theme-color" content="#0b0e13">
<link rel="icon" href="/static/favicon-32.png">
<link rel="stylesheet" href="/static/app.css">
<link rel="stylesheet" href="/static/technician-workspaces.css">
<link rel="stylesheet" href="/static/operating-systems.css">
<link rel="stylesheet" href="/static/ttg-shell.css">
<link rel="stylesheet" href="/static/ttg-theme.css">
</head>
<body>
<div class="brand-background" aria-hidden="true"></div>
<div class="boot-screen" id="boot-screen">
  <img src="/static/favicon-96.png" alt="Lumi" class="boot-logo">
  <div class="boot-title">Lumi Download Manager</div>
  <div class="boot-status" id="boot-status">Starting secure local session…</div>
  <button class="btn primary" id="boot-retry" hidden>Retry</button>
</div>

<div class="app-shell" id="app-shell" hidden>
  <aside class="sidebar" id="sidebar">
    <div class="brand-block">
      <img src="/static/favicon-96.png" alt="Lumi" class="brand-logo">
      <div><div class="brand-name">Lumi</div><div class="brand-sub">Download Manager</div></div>
      <button class="icon-btn mobile-only" id="sidebar-close" aria-label="Close menu">×</button>
    </div>

    <nav class="nav-list" aria-label="Main navigation">
      <button class="nav-item active" data-view="overview"><span>⌂</span>Overview</button>
      <button class="nav-item" data-view="downloads"><span>↓</span>All downloads <b id="nav-all-count">0</b></button>
      <button class="nav-item" data-view="unfinished"><span>◔</span>Unfinished <b id="nav-unfinished-count">0</b></button>
      <button class="nav-item" data-view="finished"><span>✓</span>Finished <b id="nav-finished-count">0</b></button>
      <div class="nav-label">Technician</div>
      <button class="nav-item" data-view="firmware"><span>▦</span>Mobile firmware</button>
      <button class="nav-item" data-view="operating_systems"><span>◫</span>Operating systems</button>
      <div class="nav-label">Organise</div>
      <button class="nav-item" data-view="queues"><span>☷</span>Queues</button>
      <button class="nav-item" data-view="categories"><span>◇</span>Categories</button>
      <button class="nav-item" data-view="grabber"><span>⌁</span>LinkGrabber</button>
    </nav>

    <button class="hunter-promo" id="hunter-promo" hidden type="button">
      <img id="hunter-promo-image" alt="">
      <span><strong id="hunter-promo-title"></strong><small id="hunter-promo-copy"></small></span>
      <i>›</i>
    </button>
    <div class="sidebar-footer">
      <div class="connection-state"><span class="state-dot" id="server-dot"></span><div><strong id="server-state">Connecting</strong><small id="client-role">Local session</small></div></div>
      <div class="sidebar-speed"><span>Current speed</span><strong id="sidebar-speed">0 B/s</strong></div>
    </div>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <button class="icon-btn mobile-only" id="sidebar-open" aria-label="Open menu">☰</button>
      <div class="view-heading"><h1 id="view-title">Overview</h1><p id="view-subtitle">Your download activity at a glance</p></div>
      <div class="top-actions">
        <label class="search-box"><span>⌕</span><input id="global-search" type="search" placeholder="Search downloads"></label>
        <div class="live-speed"><i id="speed-dot"></i><span id="top-speed">0 B/s</span></div>
        <button class="btn primary" id="new-download-btn">＋ New download</button>
      </div>
    </header>

    <main class="content" id="content">
      <section class="view active" id="view-overview"></section>
      <section class="view" id="view-downloads"></section>
      <section class="view" id="view-unfinished"></section>
      <section class="view" id="view-finished"></section>
      <section class="view" id="view-firmware"></section>
      <section class="view" id="view-operating_systems"></section>
      <section class="view" id="view-queues"></section>
      <section class="view" id="view-categories"></section>
      <section class="view" id="view-grabber"></section>
      <section class="view" id="view-settings"></section>
      <section class="view" id="view-diagnostics"></section>
    </main>
  </div>
</div>

<div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
<aside class="inspector" id="inspector" aria-label="Download inspector" hidden>
  <div class="inspector-head"><div><small>Task inspector</small><h2 id="inspector-title">Download</h2></div><button class="icon-btn" id="inspector-close">×</button></div>
  <div class="inspector-tabs" id="inspector-tabs">
    <button class="active" data-tab="overview">Overview</button><button data-tab="connections">Connections</button><button data-tab="request">Request</button><button data-tab="queue">Queue</button><button data-tab="files">Files</button><button data-tab="post">Post-processing</button><button data-tab="log">Log</button>
  </div>
  <div class="inspector-body" id="inspector-body"></div>
</aside>

<div class="modal-backdrop" id="new-modal" hidden>
  <section class="modal wide" role="dialog" aria-modal="true" aria-labelledby="new-modal-title">
    <div class="modal-head"><div><small>Add source</small><h2 id="new-modal-title">New download</h2></div><button class="icon-btn" data-close-modal="new-modal">×</button></div>
    <div class="modal-tabs" id="source-tabs"><button class="active" data-source="direct">Direct / FTP</button><button data-source="video">Video</button><button data-source="torrent">Torrent</button><button data-source="archive">Archive</button></div>
    <div class="modal-body" id="source-body"></div>
  </section>
</div>

<div class="modal-backdrop" id="queue-modal" hidden>
  <section class="modal" role="dialog" aria-modal="true"><div class="modal-head"><h2>Create queue</h2><button class="icon-btn" data-close-modal="queue-modal">×</button></div><form class="modal-body form-stack" id="queue-form"><label>Name<input class="input" name="name" required maxlength="80"></label><label>Queue ID<input class="input" name="id" required pattern="[a-zA-Z0-9_-]+" maxlength="60"></label><label>Maximum running tasks<input class="input" name="max_running" type="number" min="0" max="128" value="0"><small>0 uses the global limit.</small></label><button class="btn primary" type="submit">Create queue</button></form></section>
</div>

<div class="modal-backdrop" id="category-modal" hidden>
  <section class="modal" role="dialog" aria-modal="true"><div class="modal-head"><h2>Create category</h2><button class="icon-btn" data-close-modal="category-modal">×</button></div><form class="modal-body form-stack" id="category-form"><label>Name<input class="input" name="name" required maxlength="80"></label><label>Category ID<input class="input" name="id" required pattern="[a-zA-Z0-9_-]+" maxlength="60"></label><label>File extensions<input class="input" name="extensions" placeholder="zip, rar, 7z"></label><label>Domains<input class="input" name="domains" placeholder="downloads.example.com, *.mirror.net"></label><label>Folder name<input class="input" name="folder" required></label><label class="check"><input name="auto_extract" type="checkbox">Automatically extract completed archives</label><button class="btn primary" type="submit">Create category</button></form></section>
</div>

<div class="context-menu" id="context-menu" hidden></div>
<div class="toast-stack" id="toast-stack" aria-live="polite"></div>
<script src="/static/app.js"></script>
<script src="/static/app-hardening.js"></script>
<script src="/static/technician-workspaces.js"></script>
<script src="/static/operating-systems.js"></script>
<script src="/static/ttg-shell.js"></script>
<script src="/static/ttg-theme.js"></script>
</body>
</html>
